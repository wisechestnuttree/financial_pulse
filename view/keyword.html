  <!-- 키워드 전용 스타일 (추후 css/keyword.css로 분리 가능) -->
  <style>
    :root {
      --navy: #0D1F3C;
      --teal: #00B5AD;
      --teal-d: #009E96;
      --sub: #6B7FA3;
      --bg: #F3F5F8;
      --pos: #2ECC71;
      --neg: #E74C3C;
    }
    
    body { background-color: var(--bg); }

/* 헤더 및 알약 탭 (Pill Tabs) */
/* 기존 스타일 대체 */
.kw-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
  background: var(--panel);
  border: 1px solid var(--pbl);
  backdrop-filter: blur(16px);
  box-shadow: var(--sh);
  border-radius: var(--rxl);
  padding: 24px 36px;
  margin: 0 0 0 0;
  margin-top: 16px;
  margin-bottom: 24px;
}

/* 왼쪽 타이틀 영역 (기존과 동일하게 유지하되 간격만 조정 가능) */
.kw-title-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.kw-title-wrap i {
  font-size: 20px;          /* 급등 페이지 번개 아이콘 크기(20px)와 통일 */
  color: var(--teal);
  margin-right: 6px;
}
.page-title {
  font-size: 1.125rem;  /* 18px, 급등 페이지 제목과 동일 */
  font-weight: 900;
  margin: 0;
  line-height: 1.4;
}
.time-badge {
  background: var(--navy);
  color: #fff;
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 0.85rem;
  font-weight: 900;
}

/* 오른쪽 영역 (탭 + 시계) */
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* 시간 배지 (time-badge) 스타일 유지, 필요시 panel 느낌으로 살짝 보강 */
.time-badge {
  background: var(--navy);
  color: #fff;
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 900;
  white-space: nowrap;
}
/* 레이아웃 제어 */
#keywordContent { transition: all 0.3s ease; }
.kw-main-grid { display: grid; gap: 24px; margin-bottom: 24px; }
.single-view { grid-template-columns: 1fr; }
.split-view { grid-template-columns: 1fr 1fr; }


    /* 서브 그리드 */
    .dashboard-top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .dashboard-mid-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .split-view .dashboard-top-grid, .split-view .dashboard-mid-grid { grid-template-columns: 1fr; }

    /* 키워드 리스트 */
    .keyword-list { display: flex; flex-direction: column; gap: 10px; }
    .kw-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid #f0f4f8; border-radius: 16px; transition: all 0.2s ease; cursor: pointer; background: #fff; }
    .kw-item:hover, .kw-item.active { border-color: var(--teal); background: #f4fcfc; transform: translateX(4px); box-shadow: 0 4px 12px rgba(0,181,173,0.08); }
    .kw-item.active { border-width: 2px; padding: 11px 15px; }
    
    .kw-item-left { display: flex; align-items: center; gap: 14px; }
    .kw-rank { width: 26px; height: 26px; border-radius: 8px; background: var(--navy); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; }
    .kw-item:hover .kw-rank, .kw-item.active .kw-rank { background: var(--teal); }
    .kw-name { display: flex; align-items: center; gap: 8px; }
    .kw-name strong { font-size: 14px; font-weight: 900; color: var(--navy); }
    
    .trend-badge { font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 6px; }
    .trend-badge.badge-up { color: var(--pos); background: rgba(46,204,113,0.1); }
    .trend-badge.badge-dn { color: var(--neg); background: rgba(231,76,60,0.1); }
    .trend-badge.badge-neu { color: var(--sub); background: #f0f4f8; }
    
    .kw-cnt { font-size: 12px; font-weight: 900; color: var(--teal-d); background: #e0f2f1; padding: 4px 10px; border-radius: 8px; }

    /* 캔버스 및 차트 텍스트 */
    .gauge-info { text-align: center; margin-bottom: 10px; }
    .gauge-info h4 { font-size: 18px; font-weight: 900; color: var(--navy); margin: 0 0 4px 0; }
    .gauge-info p { font-size: 12px; color: var(--sub); font-weight: 600; margin: 0; }

    .canvas-container { border-radius: var(--rlg); width: 100%; position: relative; display: flex; align-items: center; justify-content: center; height: 280px; cursor: default; overflow: hidden; }
    .canvas-container canvas { display: block; }
    /* .canvas-container { height: 280px; } */

    /* 네트워크 필터바 (Advanced) */
    .filter-group { display: flex; gap: 8px; }
    .nf-pill { border: 1.5px solid; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; background: #fff; cursor: pointer; transition: all 0.2s; position: relative; }
    .nf-pill.people { color: #ff7675; border-color: #ff7675; background: rgba(255, 118, 117, 0.08); }
    .nf-pill.people:hover { background: rgba(255, 118, 117, 0.15); box-shadow: 0 4px 12px rgba(255, 118, 117, 0.2); }
    .nf-pill.place { color: #00b894; border-color: #00b894; background: rgba(0, 184, 148, 0.08); }
    .nf-pill.place:hover { background: rgba(0, 184, 148, 0.15); box-shadow: 0 4px 12px rgba(0, 184, 148, 0.2); }
    .nf-pill.company { color: #8c7ae6; border-color: #8c7ae6; background: rgba(140, 122, 230, 0.08); }
    .nf-pill.company:hover { background: rgba(140, 122, 230, 0.15); box-shadow: 0 4px 12px rgba(140, 122, 230, 0.2); }
    .nf-reset { border: 1.5px solid #e0e6ed; background: #fff; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; color: var(--sub); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
    .nf-reset:hover { background: #f0f4f8; border-color: var(--teal); color: var(--teal); box-shadow: 0 2px 8px rgba(0,181,173,0.15); }

    /* 최신 뉴스 하단 */
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .news-card { border: 1px solid #eef2f8; border-radius: 16px; overflow: hidden; transition: 0.3s; cursor: pointer; background: #fff; }
    .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(13,31,60,0.08); border-color: var(--teal); }
    .news-img { width: 100%; height: 120px; object-fit: cover; }
    .news-content { padding: 16px; }
    .news-tag { display: inline-block; font-size: 10px; font-weight: 900; color: var(--teal); background: #e0f2f1; padding: 4px 8px; border-radius: 6px; margin-bottom: 8px; }
    .news-title { font-size: 13px; font-weight: 800; color: var(--navy); line-height: 1.4; }

    @media (max-width: 1200px) {
      .dashboard-top-grid, .dashboard-mid-grid { grid-template-columns: 1fr; }
      .news-grid { grid-template-columns: repeat(2, 1fr); }
      .split-view { grid-template-columns: 1fr; }
    }

<!-- 키워드 전용 스크립트 -->
<script>
// ================================================================
// 전역 상태
// ================================================================
let kwCache      = { ko: null, en: null };
let currentMode    = 'single';
let currentCountry = 'kr';

// ================================================================
// API 호출 — GET /api/keyword?lang=ko|en
// ================================================================
async function fetchKeyword(lang) {
  if (kwCache[lang]) return kwCache[lang];
  try {
    const res  = await fetch(BASE_URL + '/api/keyword?lang=' + lang, { credentials: 'include' });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    kwCache[lang] = json.data;
    return json.data;
  } catch (e) {
    console.error('keyword API 오류:', e);
    return null;
  }
}

// ================================================================
// API 데이터 → KW_DATA 형식 변환
// top7, keyword_network, hot_news → 기존 렌더 함수에 맞게 변환
// ================================================================
function toKwData(d) {
  if (!d) return [];
  const netNodes  = (d.keyword_network || {}).nodes  || [];
  const netEdges  = (d.keyword_network || {}).edges  || [];
  const hotNews   = d.hot_news   || [];

  // nodes: { keyword, count } → Map으로 검색
  const nodeMap = new Map(netNodes.map(n => [n.keyword, n]));

  return (d.top7 || []).map(item => {
    // 연관 강도 계기판 stats — hot_news의 strength.related 활용
    const newsItem = hotNews.find(h => h.keyword === item.keyword) || {};
    const strength = newsItem.strength || {};
    const related  = strength.related || [];
    const stats    = {};
    related.forEach(r => { stats[r.keyword] = r.strength || 50; });

    // 키워드 네트워크 연관어 — edges에서 해당 키워드 연결 노드 추출
    const relates = netEdges
      .filter(e => e.source === item.keyword || e.target === item.keyword)
      .map(e => ({ n: e.source === item.keyword ? e.target : e.source, t: 'company' }))
      .slice(0, 6);

    return {
      rank   : item.rank,
      name   : item.keyword,
      score  : item.count,
      change : item.change > 0 ? '+' + item.change : String(item.change),
      up     : item.change > 0 ? true : item.change < 0 ? false : null,
      total  : item.count,
      stats  : Object.keys(stats).length ? stats : { '연관 키워드': 40, '트렌드 영향': 30, '네트워크 연결': 20 },
      relates: relates,
      article: newsItem.article || null,
    };
  });
}

// ================================================================
// 주간 트렌드 라인 차트 — API weekly_trend 데이터 사용
// ================================================================
function drawSmoothLineChartFromApi(cid, weeklyTrend) {
  const canvas = document.getElementById(cid);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const margin = { top: 40, right: 30, bottom: 80, left: 50 };
  let width, height;

  const SHOW_VALUES = true;

  // 무지개 색상 팔레트
  const COLOR_PALETTE = [
    '#FF3B30', '#FF9500', '#5AC8FA', '#34C759', '#FFCC00',
    '#007AFF', '#AF52DE', '#FF2D55', '#FF9F0A', '#30B0C0',
    '#E5B8FF', '#FF6B6B'
  ];

  // Y축 눈금 개수 (자동 생성)
  const Y_TICK_COUNT = 5;

  function resizeAndDraw() {
    const container = canvas.parentElement;
    width = container.clientWidth;
    height = 500;
    canvas.width = width;
    canvas.height = height;

    if (!weeklyTrend || !weeklyTrend.lines || !weeklyTrend.lines.length) {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#a0aec0';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('데이터 없음', width / 2, height / 2);
      return;
    }

    const dates = weeklyTrend.dates || [];
    const lines = weeklyTrend.lines.slice(0, 4);
    const chartWidth = width - margin.left - margin.right;
    const chartHeight = height - margin.top - margin.bottom;
    const xStep = chartWidth / Math.max(dates.length - 1, 1);

    // ========== Y축 자동 범위 계산 ==========
    let allValues = lines.flatMap(l => l.data).filter(v => v !== undefined && !isNaN(v));
    if (allValues.length === 0) allValues = [0];
    const dataMin = Math.min(...allValues);
    const dataMax = Math.max(...allValues);
    const range = dataMax - dataMin;

    // 여백: 데이터 범위의 10%를 위아래에 추가 (최소 5% 보장)
    let yMin = dataMin - range * 0.1;
    let yMax = dataMax + range * 0.1;

    // 0 근처 데이터가 있을 경우 0을 포함하도록 조정 (음수 방지)
    if (dataMin > 0 && dataMin < range * 0.2) yMin = 0;
    if (dataMax < 0) yMax = 0;

    // 최소/최대값이 같으면 범위 강제 확장
    if (Math.abs(yMax - yMin) < 0.1) {
      yMin = yMin - 10;
      yMax = yMax + 10;
    }

    // Y축 눈금 생성 (균등 간격)
    const yStep = (yMax - yMin) / Y_TICK_COUNT;
    const yTickValues = [];
    for (let i = 0; i <= Y_TICK_COUNT; i++) {
      yTickValues.push(yMin + i * yStep);
    }

    // 각 라인의 포인트 계산
    const series = lines.map((line, idx) => {
      const color = COLOR_PALETTE[idx % COLOR_PALETTE.length];
      const points = line.data.map((val, i) => {
        // Y 좌표 계산 (자동 범위 기준)
        let y = margin.top + chartHeight - ((val - yMin) / (yMax - yMin)) * chartHeight;
        // 범위 밖의 값은 살짝 클리핑 (화면 밖으로 나가지 않도록)
        y = Math.min(Math.max(y, margin.top), margin.top + chartHeight);
        return {
          x: margin.left + i * xStep,
          y: y,
          val: val,
          label: dates[i] || '',
        };
      });
      return { name: line.keyword, color, points };
    });

    let hoveredSeries = null;
    let hoveredIndex = null;

    function drawAnnotations(s) {
      if (!SHOW_VALUES) return;
      s.points.forEach(p => {
        if (p.val === undefined) return;
        ctx.font = 'bold 10px "Noto Sans KR", sans-serif';
        ctx.fillStyle = s.color;
        ctx.shadowBlur = 0;
        ctx.textAlign = 'center';
        ctx.fillText(p.val, p.x, p.y - 8);
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();

      // 흰색 배경
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);

      // Y축 그리드 및 눈금 (자동 범위)
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 1;
      ctx.font = '10px "Noto Sans KR", sans-serif';
      ctx.fillStyle = '#64748b';
      ctx.textAlign = 'right';
      for (let i = 0; i < yTickValues.length; i++) {
        const val = yTickValues[i];
        const y = margin.top + chartHeight - ((val - yMin) / (yMax - yMin)) * chartHeight;
        ctx.beginPath();
        ctx.moveTo(margin.left, y);
        ctx.lineTo(width - margin.right, y);
        ctx.stroke();
        ctx.fillText(Math.round(val * 10) / 10, margin.left - 8, y + 3);
      }

      // X축 날짜 라벨
      ctx.textAlign = 'center';
      ctx.fillStyle = '#475569';
      ctx.font = '9px "Noto Sans KR", sans-serif';
      dates.forEach((d, i) => {
        const x = margin.left + i * xStep;
        ctx.fillText(d.slice(5), x, height - margin.bottom + 15);
      });

      // 축 경계선
      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, height - margin.bottom);
      ctx.lineTo(width - margin.right, height - margin.bottom);
      ctx.stroke();

      // 라인 & 마커
      series.forEach(s => {
        const isHover = (hoveredSeries === s.name);
        ctx.beginPath();
        ctx.lineWidth = isHover ? 4 : 2.5;
        ctx.strokeStyle = s.color;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        if (s.points.length === 0) return;
        ctx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 0; i < s.points.length - 1; i++) {
          const p1 = s.points[i];
          const p2 = s.points[i + 1];
          const cp1x = p1.x + (p2.x - p1.x) / 3;
          const cp1y = p1.y;
          const cp2x = p2.x - (p2.x - p1.x) / 3;
          const cp2y = p2.y;
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
        }
        ctx.stroke();

        s.points.forEach((p, i) => {
          const isHoverPoint = (isHover && hoveredIndex === i);
          ctx.beginPath();
          ctx.arc(p.x, p.y, isHoverPoint ? 8 : 5, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          ctx.strokeStyle = s.color;
          ctx.lineWidth = isHoverPoint ? 2.5 : 2;
          ctx.stroke();
          if (isHoverPoint) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = `${s.color}30`;
            ctx.fill();
          }
        });

        drawAnnotations(s);
      });

      // 레전드 (하단 중앙)
      const legendItems = series.map(s => ({ name: s.name, color: s.color }));
      const itemWidth = 95;
      const itemHeight = 20;
      const itemsPerRow = Math.floor((width - margin.left - margin.right) / itemWidth);
      const rows = Math.ceil(legendItems.length / itemsPerRow);
      const legendTop = height - margin.bottom + 30;
      const legendStartX = margin.left + (chartWidth - (itemsPerRow * itemWidth)) / 2;

      ctx.font = '10px "Noto Sans KR", sans-serif';
      ctx.textAlign = 'left';
      for (let i = 0; i < legendItems.length; i++) {
        const row = Math.floor(i / itemsPerRow);
        const col = i % itemsPerRow;
        const x = legendStartX + col * itemWidth;
        const y = legendTop + row * (itemHeight + 5);
        ctx.fillStyle = legendItems[i].color;
        ctx.fillRect(x, y - 12, 12, 12);
        ctx.fillStyle = '#1e293b';
        ctx.fillText(legendItems[i].name, x + 16, y);
      }

      // 호버 툴팁
      if (hoveredSeries && hoveredIndex !== null) {
        const s = series.find(s => s.name === hoveredSeries);
        if (s && s.points[hoveredIndex]) {
          const p = s.points[hoveredIndex];
          const tipText = `${s.name}  ${p.label}  ${p.val}`;
          ctx.font = 'bold 11px "Noto Sans KR", sans-serif';
          const textWidth = ctx.measureText(tipText).width;
          const tipWidth = textWidth + 20;
          const tipHeight = 28;
          let tipX = p.x - tipWidth / 2;
          let tipY = p.y - tipHeight - 8;
          if (tipX < margin.left) tipX = margin.left;
          if (tipX + tipWidth > width - margin.right) tipX = width - margin.right - tipWidth;
          if (tipY < margin.top) tipY = p.y + 12;
          ctx.fillStyle = '#1e293b';
          ctx.shadowBlur = 4;
          ctx.fillRect(tipX, tipY, tipWidth, tipHeight);
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ffffff';
          ctx.textAlign = 'center';
          ctx.fillText(tipText, tipX + tipWidth / 2, tipY + 18);
        }
      }
      ctx.restore();
    }

    // 마우스 인터랙션
    function handleMouseMove(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mouseX = (e.clientX - rect.left) * scaleX;
      const mouseY = (e.clientY - rect.top) * scaleY;
      let found = null;
      for (const s of series) {
        for (let i = 0; i < s.points.length; i++) {
          const p = s.points[i];
          if (Math.hypot(mouseX - p.x, mouseY - p.y) < 15) {
            found = { name: s.name, idx: i };
            break;
          }
        }
        if (found) break;
      }
      if (found) {
        canvas.style.cursor = 'crosshair';
        hoveredSeries = found.name;
        hoveredIndex = found.idx;
        draw();
      } else {
        canvas.style.cursor = 'default';
        hoveredSeries = null;
        hoveredIndex = null;
        draw();
      }
    }

    canvas.removeEventListener('mousemove', handleMouseMove);
    canvas.removeEventListener('mouseleave', () => {});
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseleave', () => {
      canvas.style.cursor = 'default';
      hoveredSeries = null;
      hoveredIndex = null;
      draw();
    });

    draw();
  }

  window.addEventListener('resize', resizeAndDraw);
  resizeAndDraw();
}

// ================================================================
// 키워드 네트워크 — API keyword_network 데이터 사용
// ================================================================
function drawNetworkFromApi(cid, netWrapId, networkData) {
  console.log('drawNetworkFromApi 실행됨');
  const cvs     = document.getElementById(cid);
  const netWrap = document.getElementById(netWrapId);
  if (!cvs || !netWrap) return;
  if (cvs._animId) cancelAnimationFrame(cvs._animId);

  const ctx  = cvs.getContext('2d');
  cvs.width  = cvs.parentElement.clientWidth  || 420;
  cvs.height = cvs.parentElement.clientHeight || 280;
  const w = cvs.width, h = cvs.height;

  const apiNodes = (networkData || {}).nodes || [];
  const apiEdges = (networkData || {}).edges || [];

  if (!apiNodes.length) {
    ctx.fillStyle = '#a0aec0'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('네트워크 데이터 없음', w / 2, h / 2);
    return;
  }

  const maxCnt = Math.max(...apiNodes.map(n => n.count), 1);
  const nodesMap = new Map();
  apiNodes.forEach((n, i) => {
    nodesMap.set(n.keyword, {
      id: n.keyword, type: 'keyword', rank: i + 1,
      r: 22 + (n.count / maxCnt) * 20,
      color: '#f1c40f',
      x: w / 2 + (Math.random() - 0.5) * 200,
      y: h / 2 + (Math.random() - 0.5) * 150,
      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
    });
  });
  const edges = apiEdges.map(e => ({ from: e.source, to: e.target, w: e.weight }));

  let nodes    = Array.from(nodesMap.values());
  let dragging = null, holding = null;
  const REPEL = 320, ATTRACT = 0.0004, DAMPING = 0.94, BOUND_PAD = 32;

  function physics() {
    if (dragging) return;
    nodes.forEach(a => {
      nodes.forEach(b => {
        if (a === b) return;
        const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy) || 1;
        const force = ATTRACT / (dist * 0.5);
        a.vx += dx * force; a.vy += dy * force;
      });
      nodes.forEach(b => {
        if (a === b) return;
        const dx = a.x - b.x, dy = a.y - b.y, dist = Math.hypot(dx, dy) || 1;
        const minDist = a.r + b.r + 20;
        if (dist < minDist) { const force = REPEL / (dist * dist); a.vx += (dx / dist) * force; a.vy += (dy / dist) * force; }
      });
      a.vx *= DAMPING; a.vy *= DAMPING; a.x += a.vx; a.y += a.vy;
      if (a.x < BOUND_PAD + a.r) { a.x = BOUND_PAD + a.r; a.vx *= -0.5; }
      if (a.x > w - BOUND_PAD - a.r) { a.x = w - BOUND_PAD - a.r; a.vx *= -0.5; }
      if (a.y < BOUND_PAD + a.r) { a.y = BOUND_PAD + a.r; a.vy *= -0.5; }
      if (a.y > h - BOUND_PAD - a.r) { a.y = h - BOUND_PAD - a.r; a.vy *= -0.5; }
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
    let activeIds = new Set();
    if (holding) { activeIds.add(holding.id); edges.forEach(e => { if (e.from === holding.id) activeIds.add(e.to); if (e.to === holding.id) activeIds.add(e.from); }); }
    edges.forEach(edge => {
      const fn = nodes.find(n => n.id === edge.from), tn = nodes.find(n => n.id === edge.to);
      if (!fn || !tn) return;
      ctx.beginPath(); ctx.moveTo(fn.x, fn.y); ctx.lineTo(tn.x, tn.y);
      ctx.strokeStyle = (holding && (edge.from === holding.id || edge.to === holding.id)) ? '#8B4513' : 'rgba(200,200,200,0.4)';
      ctx.lineWidth = (holding && (edge.from === holding.id || edge.to === holding.id)) ? 3 : 1;
      ctx.stroke();
    });
    nodes.forEach(nd => {
      const isActive = holding ? activeIds.has(nd.id) : true;
      const isHeld   = (holding === nd);
      if (isHeld) { ctx.beginPath(); ctx.arc(nd.x, nd.y, nd.r + 6, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,181,173,0.2)'; ctx.fill(); }
      // ========== 색상 결정 (rank 1~5: 빨강→초록 그라데이션, 나머지 단색) ==========
      const rank = nd.rank;
      let fillColor, textColor;

      const rankColors = {
        1: { bg: '#FF0000', text: '#FFFFFF' },   // 빨강
        2: { bg: '#CC9900', text: '#FFFFFF' },   // 진한노랑
        3: { bg: '#0000FF', text: '#FFFFFF' },   // 블루
        4: { bg: '#006400', text: '#FFFFFF' },   // 딥그린
        // 5: { bg: '#FF00FF', text: '#FFFFFF' }    // 마젠타 (글자 흰색)
      };

      if (rank !== undefined && rank >= 1 && rank <= 4) {        
        const color = rankColors[rank];
        fillColor = color.bg;
        textColor = color.text;
      } else {
        // 연관 키워드 (rank 없음 또는 6 이상): 연한 회색 배경 + 진한 글씨
        fillColor = '#CCFFCC';       // 매우 연한 회색
        textColor = '#1E293B';       // 짙은 회색 (가독성 좋음)
      }

      // (선택) active 상태일 때 시각적 강조를 원하면 아래처럼 테두리 추가 가능
      // if (isActive) ctx.shadowBlur = 8;
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.arc(nd.x, nd.y, nd.r, 0, Math.PI * 2);
      ctx.fill();

      // (선택) 테두리 추가 – 연관 키워드 경계를 살짝 표현
      if (rank === undefined || rank > 5) {
        ctx.strokeStyle = '#CBD5E1';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      if (isHeld) { ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2.5; ctx.stroke(); }
      ctx.beginPath(); ctx.arc(nd.x - nd.r * 0.35, nd.y - nd.r * 0.35, nd.r * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
      ctx.shadowBlur = 1.2; ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.fillStyle = textColor; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      let size = 10; ctx.font = `700 ${size}px "Noto Sans KR",sans-serif`;
      while (ctx.measureText(nd.id).width > nd.r * 1.6 && size > 8) { size -= 0.5; ctx.font = `700 ${size}px "Noto Sans KR",sans-serif`; }
      ctx.fillText(nd.id, nd.x, nd.y); ctx.shadowBlur = 0;
    });
  }

  cvs.onmousedown = (e) => {
    const rect = cvs.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (w / rect.width), my = (e.clientY - rect.top) * (h / rect.height);
    const hit = nodes.find(n => Math.hypot(mx - n.x, my - n.y) <= n.r + 6);
    dragging = hit || null; holding = hit || null;
    cvs.style.cursor = hit ? 'grabbing' : 'default';
  };
  cvs.onmousemove = (e) => {
    const rect = cvs.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (w / rect.width), my = (e.clientY - rect.top) * (h / rect.height);
    if (dragging) { dragging.x = mx; dragging.y = my; dragging.vx = 0; dragging.vy = 0; }
    else { cvs.style.cursor = nodes.some(n => Math.hypot(mx - n.x, my - n.y) <= n.r + 6) ? 'grab' : 'default'; }
  };
  cvs.onmouseup = () => { if (dragging) { dragging.vx *= 0.2; dragging.vy *= 0.2; } dragging = null; holding = null; cvs.style.cursor = 'default'; };
  cvs.onmouseleave = () => { dragging = null; holding = null; cvs.style.cursor = 'default'; };

  function loop() { physics(); draw(); cvs._animId = requestAnimationFrame(loop); }
  loop();
}

// ================================================================
// 탭 바인딩 및 레이아웃 렌더
// ================================================================
function bindTabs() {
  document.querySelectorAll('.pill-tab').forEach(btn => {
    btn.onclick = async () => {
      document.querySelectorAll('.pill-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const v = btn.dataset.view;
      if (v === 'split') currentMode = 'split';
      else { currentMode = 'single'; currentCountry = v; }
      await renderLayout();
    };
  });
}

async function renderLayout() {
  const wrap = document.getElementById('keywordContent');
  wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--sub);">데이터 불러오는 중...</div>';
  wrap.className = `kw-main-grid ${currentMode}-view`;

  if (currentMode === 'single') {
    const lang = currentCountry === 'kr' ? 'ko' : 'en';
    const d    = await fetchKeyword(lang);
    wrap.innerHTML = '';
    wrap.appendChild(await buildDashboard(currentCountry, false, d));
  } else {
    const [dKo, dEn] = await Promise.all([fetchKeyword('ko'), fetchKeyword('en')]);
    wrap.innerHTML = '';
    wrap.appendChild(await buildDashboard('kr', true, dKo));
    wrap.appendChild(await buildDashboard('us', true, dEn));
  }
}

// 대시보드 컬럼 빌드 — API 데이터 기반
// ================================================================
async function buildDashboard(code, isSplit, apiData) {
  const kwList  = toKwData(apiData);
  const dataList = isSplit ? kwList.slice(0, 7) : kwList;
  const flag     = code === 'kr' ? '🇰🇷 KR 국내' : '🌐 해외';
  const topTitle = isSplit
    ? `${flag} 실시간 Top 7`
    : '<i class="fas fa-clock"></i> 오늘의 키워드 Top7';

  const sec = document.createElement('section');
  sec.className = 'dashboard-column';
  sec.innerHTML = `
    <div class="dashboard-top-grid">
      <div class="panel">
        <div class="panel-hdr"><div class="hdr-left">${topTitle}</div></div>
        <div class="keyword-list" id="list_${code}"></div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><div class="hdr-left"><i class="fas fa-tachometer-alt"></i> 연관 강도 계기판</div></div>
        <div class="gauge-info">
          <h4 id="gtitle_${code}">키워드</h4>
          <p id="gdesc_${code}">📰 주간 누적: -건</p>
        </div>
        <div class="canvas-container"><canvas id="gauge_${code}"></canvas></div>
      </div>
    </div>
    <div class="dashboard-mid-grid">
      <div class="panel">
        <div class="panel-hdr"><div class="hdr-left"><i class="fas fa-chart-line"></i>주요 키워드 주간 트렌드</div></div>
        <div class="canvas-container trend-container"><canvas id="trend_${code}"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><div class="hdr-left"><i class="fas fa-share-alt"></i> 키워드 네트워크</div><span style="font-size:11px;font-weight:700;color:var(--sub);">드래그 가능</span></div>
        <div class="canvas-container net-container" id="netWrap_${code}"><canvas id="net_${code}"></canvas></div>
      </div>
    </div>
  `;

  setTimeout(() => {
    const listWrap = sec.querySelector(`#list_${code}`);
    if (!dataList.length) {
      listWrap.innerHTML = '<div style="color:var(--sub);padding:16px;">데이터 없음</div>';
      return;
    }
    dataList.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = `kw-item ${idx === 0 ? 'active' : ''}`;
      const badgeCls  = item.up === true ? 'badge-up' : item.up === false ? 'badge-dn' : 'badge-neu';
      const badgeIcon = item.up === true ? '▲' : item.up === false ? '▼' : '–';
      row.innerHTML = `
        <div class="kw-item-left">
          <div class="kw-rank">${idx + 1}</div>
          <div class="kw-name">
            <strong>${item.name}</strong>

          </div>
        </div>
        <div class="kw-cnt"><i class="fas fa-newspaper"></i> ${item.score}</div>
      `;
      row.onmouseenter = () => {
        listWrap.querySelectorAll('.kw-item').forEach(el => el.classList.remove('active'));
        row.classList.add('active');
        updateGauge(code, item);
      };
      row.onclick = () => {
        if (typeof openAnalysisOverlay === 'function') openAnalysisOverlay(item.name);
      };
      listWrap.appendChild(row);
    });

    // 첫 번째 키워드로 초기 렌더
    if (dataList[0]) updateGauge(code, dataList[0]);

    // 주간 트렌드 — API weekly_trend 사용
    drawSmoothLineChartFromApi(`trend_${code}`, apiData ? apiData.weekly_trend : null);

    // 키워드 네트워크 — API keyword_network 사용
    drawNetworkFromApi(`net_${code}`, `netWrap_${code}`, apiData ? apiData.keyword_network : null);

    // 최신 핫이슈 뉴스 패널 업데이트
    renderHotNewsPanel(apiData);

  }, 50);
  return sec;
}

// ================================================================
// 연관 강도 계기판 — 기존 함수 유지 (item.stats 사용)
// ================================================================
function updateGauge(code, item) {
  const titleEl = document.getElementById(`gtitle_${code}`);
  const descEl = document.getElementById(`gdesc_${code}`);
  if (titleEl) titleEl.innerText = item.name;
  if (descEl) descEl.innerText = `📰 주간 누적: ${item.total}건`;

  const canvas = document.getElementById(`gauge_${code}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const container = canvas.parentElement;
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  if (canvas.width === 0 || canvas.height === 0) return;

  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h - 18;
  const r = Math.min(cx, cy) * 0.80;
  const start = Math.PI, end = 2 * Math.PI;
  const totalAng = end - start;

  // 배경 반원
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.arc(cx, cy, r, start, end);
  ctx.lineTo(cx, cy);
  ctx.fillStyle = "#f0f6ff";
  ctx.fill();
  ctx.strokeStyle = "rgba(0,181,173,.2)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // 눈금 (0~100)
  for (let i = 0; i <= 20; i++) {
    let v = i * 5;
    let ang = start + (v / 100) * totalAng;
    let major = v % 10 === 0;
    let len = major ? 14 : 8;
    let x1 = cx + Math.cos(ang) * (r - len);
    let y1 = cy + Math.sin(ang) * (r - len);
    let x2 = cx + Math.cos(ang) * (r + 4);
    let y2 = cy + Math.sin(ang) * (r + 4);
    let rC, gC, bC;
    if (v < 50) {
      let t = v / 50;
      rC = 50 + t * 205;
      gC = 180 - t * 90;
      bC = 70 - t * 40;
    } else {
      let t = (v - 50) / 50;
      rC = 255;
      gC = 90 - t * 60;
      bC = 30 - t * 20;
    }
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgb(${Math.floor(rC)}, ${Math.floor(gC)}, ${Math.floor(bC)})`;
    ctx.lineWidth = major ? 2 : 1;
    ctx.stroke();
  }

  // stats 데이터 준비
  let statsEntries = Object.entries(item.stats || {});
  if (statsEntries.length < 3) {
    const fallbacks = [["연관 키워드", 40], ["트렌드 영향", 30], ["네트워크 연결", 20]];
    for (let i = statsEntries.length; i < 3 && i < fallbacks.length; i++) statsEntries.push(fallbacks[i]);
  }
  const sorted = [...statsEntries].sort((a, b) => b[1] - a[1]);
  const top3 = sorted.slice(0, 3);
  // top3 배열을 무작위로 섞음 (Fisher-Yates 셔플)
  const shuffled = [...top3];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const rearranged = shuffled.length === 3 ? shuffled : top3;
  const segAng = totalAng / 3;

  // 3개 영역에 텍스트 표시
  for (let i = 0; i < rearranged.length; i++) {
    const [name, value] = rearranged[i];
    const mid = start + i * segAng + segAng / 2;
    const tx = cx + Math.cos(mid) * r * 0.62;
    const ty = cy + Math.sin(mid) * r * 0.62;
    let fontSize = Math.min(12, 10 + Math.floor(value / 10));
    ctx.fillStyle = "#0D1F3C";
    ctx.font = `bold ${fontSize}px 'Sora', 'Noto Sans KR'`;
    ctx.fillText(name.length > 7 ? name.slice(0, 6) + '..' : name, tx - 15, ty - 8);
    ctx.font = "bold 11px 'Sora'";
    ctx.fillStyle = "#00B5AD";
    ctx.fillText(`${Math.round(value)}%`, tx - 12, ty + 12);
  }

  // needle: 가장 높은 값을 가진 키워드가 위치한 영역의 중앙을 가리킴
  const highestKeyword = top3[0][0];          // 가장 높은 값의 키워드 이름
  const targetIndex = rearranged.findIndex(([name]) => name === highestKeyword);
  // targetIndex가 -1이면 0으로 처리 (안전장치)
  const idx = targetIndex >= 0 ? targetIndex : 0;
  const needleAng = start + (idx + 0.5) * segAng;  // 해당 영역의 중앙 각도
  const needleLen = r * 0.55;
  const nx = cx + Math.cos(needleAng) * needleLen;
  const ny = cy + Math.sin(needleAng) * needleLen;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(nx, ny);
  ctx.strokeStyle = "#C9A227";
  ctx.lineWidth = 4;
  ctx.stroke();

  const arrowSize = 8;
  const wx1 = nx - Math.cos(needleAng + 0.5) * arrowSize;
  const wy1 = ny - Math.sin(needleAng + 0.5) * arrowSize;
  const wx2 = nx - Math.cos(needleAng - 0.5) * arrowSize;
  const wy2 = ny - Math.sin(needleAng - 0.5) * arrowSize;
  ctx.beginPath();
  ctx.moveTo(nx, ny);
  ctx.lineTo(wx1, wy1);
  ctx.lineTo(wx2, wy2);
  ctx.fillStyle = "#C9A227";
  ctx.fill();

  // 중앙 원
  ctx.beginPath();
  ctx.arc(cx, cy, 16, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,181,173,.2)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 9, 0, Math.PI * 2);
  ctx.fillStyle = "#00B5AD";
  ctx.fill();

  ctx.fillStyle = "#5A6E8C";
  ctx.font = "bold 10px 'Sora'";
  ctx.fillText("", cx + r - 28, cy - 14);
}

// ================================================================
// 최신 핫이슈 뉴스 패널 — API hot_news 기반
// ================================================================
function renderHotNewsPanel(apiData) {
  const newsGrid = document.querySelector('.news-grid');
  if (!newsGrid || !apiData) return;
  const hotNews = apiData.hot_news || [];
  if (!hotNews.length) return;

  const tagMap = { positive: '긍정', negative: '부정', neutral: '중립' };
  const tagColorMap = { positive: 'var(--pos)', negative: 'var(--neg)', neutral: 'var(--sub)' };

  const sectorImgMap = {
    'IT/기술'    : 'photo/tech.png',
    '중공업/인프라': 'photo/industry.png',
    '소비재/서비스': 'photo/consumer.png',
    '바이오/헬스' : 'photo/bio.png',
    '모빌리티'   : 'photo/mobility.png',
    '매크로/정책' : 'photo/macro_policy.png',
    '금융'       : 'photo/finance.png',
  };
  const defaultImg = 'photo/news_default.png';

  // 상위 6개 키워드 각각 최대 2개 기사 수집 → 총 12개 카드
  const topKeywords = hotNews.slice(0, 6);   // 상위 6개 키워드
  const cards = [];
  for (const kwItem of topKeywords) {
    const articles = kwItem.articles || [];
    const takeArticles = articles.slice(0, 2);   // 키워드당 최대 2개
    for (const art of takeArticles) {
      cards.push({ keyword: kwItem.keyword, art });
    }
  }
  // 만약 12개 미만이어도 정상 동작 (부족한 만큼만 표시)

  newsGrid.innerHTML = cards.map(({ keyword, art }) => {
    const tag      = art.tendency || 'neutral';
    const sector   = art.sector   || '';
    const score    = art.tend_score ? (art.tend_score * 100).toFixed(0) : '-';
    const imgSrc   = sectorImgMap[sector] || defaultImg;
    const tagColor = tagColorMap[tag] || 'var(--sub)';
    const tagLabel = tagMap[tag]      || '중립';

    return `
      <a class="news-card" href="${art.url || '#'}" target="_blank" rel="noopener"
         style="text-decoration:none;">
        <img class="news-img" src="${imgSrc}" alt="${sector || 'news'}"
             onerror="this.onerror=null; this.src='${defaultImg}';">
        <div class="news-content">
          <span class="news-tag">${keyword}</span>
          ${sector ? `<span style="
          font-size:11px;font-weight:600;
          color:var(--teal);
          background:rgba(0,181,173,0.1);
          padding:2px 8px;border-radius:20px;
        ">${sector}</span>` : ''}
          <div class="news-title">${art.title || keyword + ' 관련 기사'}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
            <span style="font-size:11px;font-weight:700;color:${tagColor};">${tagLabel}</span>
            <span style="font-size:11px;color:var(--sub);">점수: ${score}</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

async function fpInitKeyword() {
  bindTabs();
  await renderLayout();
  setInterval(() => {
    const d = new Date();
    document.getElementById('liveTime').innerText =
      `${String(d.getHours()).padStart(2,'0')}시 ${String(d.getMinutes()).padStart(2,'0')}분 ${String(d.getSeconds()).padStart(2,'0')}초`;
  }, 1000);
  window.addEventListener('resize', () => renderLayout());
}

window.addEventListener('DOMContentLoaded', async () => {
  const session = await checkSession(false);
  if (!session) return;
  if (typeof renderSidebar === 'function') {
    document.getElementById('sidebarWrap').innerHTML = renderSidebar('keyword');
    if (typeof bindSidebarEvents === 'function') bindSidebarEvents();

  await fpInitKeyword();
});
