<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크롤링 오류 재시도 관리자</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .window {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 800px;
            max-width: 100%;
            overflow: hidden;
        }
        .title-bar {
            background: #1e2a3a;
            color: white;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title-bar span:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            background: #dc3545;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 12px;
            margin-left: 10px;
        }
        .content {
            padding: 20px;
        }
        .status-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 20px;
        }
        .status-item {
            flex: 1;
            text-align: center;
        }
        .status-count {
            font-size: 28px;
            font-weight: bold;
        }
        .error-count { color: #dc3545; }
        .warn-count { color: #ffc107; }
        .retry-count { color: #17a2b8; }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .log-table th, .log-table td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
        }
        .log-table th {
            background: #e9ecef;
            font-weight: 600;
        }
        .error-row {
            background-color: #fff5f5;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-error { background: #dc3545; color: white; }
        .status-warn { background: #ffc107; color: #212529; }
        .btn-retry {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-retry:hover {
            background: #0b5ed7;
            transform: scale(1.02);
        }
        .btn-retry:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .message-area {
            margin-top: 15px;
            padding: 12px;
            background: #e2f0fb;
            border-radius: 12px;
            font-size: 13px;
            display: none;
        }
        .message-area.show {
            display: block;
        }
        hr {
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="window">
    <div class="title-bar">
        <span>🕷️ 크롤링 스케줄러 관리 <span class="badge">오류 재시도</span></span>
        <span>🔁 v1.0</span>
    </div>
    <div class="content">
        <div class="status-summary">
            <div class="status-item"><div class="status-count error-count" id="errorCount">0</div><div>ERROR</div><div>패시브 대상</div></div>
            <div class="status-item"><div class="status-count warn-count" id="warnCount">0</div><div>WARN</div><div>비지역 실행</div></div>
            <div class="status-item"><div class="status-count retry-count" id="retryCount">0</div><div>재시도 예정</div><div>선택 항목</div></div>
        </div>

        <table class="log-table" id="logTable">
            <thead>
                <tr><th>시간</th><th>레벨</th><th>메시지 / URL</th><th style="width:50px">선택</th></tr>
            </thead>
            <tbody id="logBody">
                <!-- JS로 채움 -->
            </tbody>
        </table>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <input type="checkbox" id="selectAll"> 전체 선택 (ERROR만)
            </div>
            <button class="btn-retry" id="retryBtn">🚀 오류 재시도 실행</button>
        </div>

        <div id="messageArea" class="message-area"></div>
        <hr>
        <div style="font-size: 12px; color: #6c757d;">
        ※ ERROR 로그 대상만 재시도 가능하며, 재시도 후 성공/실패 피드백을 보여줍니다.
        </div>
    </div>
</div>

<script>
    // BASE_URL: iframe은 독립 페이지이므로 직접 정의
    const BASE_URL = window.location.origin;

    let errorItems = [];
    let warnLogs   = [];

    // ── 실제 API에서 crawl 로그 로드
    async function loadLogs() {
        try {
            const res = await fetch(BASE_URL + '/logs/search', {
                method     : 'POST',
                headers    : { 'Content-Type': 'application/json' },
                credentials: 'include',
                body       : JSON.stringify({ subject: 'crawl', size: 200 })
            });
            const data = await res.json();
            if (!res.ok || data.success === false) throw new Error(data.message || '로그 조회 실패');

            const logs = (data.data?.logs || data.logs || []).map((l, idx) => ({
                id    : l.log_id || `LOG-${String(idx + 1).padStart(5, '0')}`,
                time  : (l.timestamp || '').replace('T', ' ').slice(0, 19),
                level : (l.level || 'INFO').toUpperCase(),
                detail: l.message || '',
            }));

            errorItems = logs
                .filter(l => l.level === 'ERROR')
                .map(l => ({ ...l, selected: false }));

            warnLogs = logs.filter(l => l.level === 'WARN' || l.level === 'WARNING');

        } catch (e) {
            console.error('로그 조회 실패:', e);
            showMessage('⚠️ 로그를 불러오지 못했습니다: ' + e.message, 'error');
        }
        renderTable();
    }



    function renderTable() {
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = '';
        // ERROR + WARN 모두 표시하되, 선택 체크박스는 ERROR에만
        const allDisplay = [...errorItems, ...warnLogs];
        allDisplay.sort((a,b) => new Date(b.time) - new Date(a.time)); // 최신순

        allDisplay.forEach(item => {
            const isError = item.level === "ERROR";
            const row = tbody.insertRow();
            row.className = isError ? 'error-row' : '';

            // 시간
            const cellTime = row.insertCell(0);
            cellTime.innerText = item.time;
            // 레벨
            const cellLevel = row.insertCell(1);
            const levelSpan = document.createElement('span');
            levelSpan.className = `status-badge ${isError ? 'status-error' : 'status-warn'}`;
            levelSpan.innerText = item.level;
            cellLevel.appendChild(levelSpan);
            // 상세
            const cellDetail = row.insertCell(2);
            cellDetail.innerText = item.detail;
            // 선택 (ERROR에만)
            const cellSelect = row.insertCell(3);
            if (isError) {
                const chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.checked = item.selected;
                chk.addEventListener('change', (e) => {
                    item.selected = e.target.checked;
                    updateSummaryAndSelectAll();
                });
                cellSelect.appendChild(chk);
            } else {
                cellSelect.innerText = '—';
            }
        });

        document.getElementById('errorCount').innerText = errorItems.length;
        document.getElementById('warnCount').innerText = warnLogs.length;
        const selectedCount = errorItems.filter(e => e.selected).length;
        document.getElementById('retryCount').innerText = selectedCount;

        // 전체선택 체크박스 상태 동기화
        const selectAllChk = document.getElementById('selectAll');
        if (errorItems.length > 0) {
            const allSelected = errorItems.every(e => e.selected);
            selectAllChk.checked = allSelected;
            selectAllChk.indeterminate = (!allSelected && errorItems.some(e => e.selected));
        } else {
            selectAllChk.checked = false;
            selectAllChk.indeterminate = false;
        }
    }

    function updateSummaryAndSelectAll() {
        const selectedCount = errorItems.filter(e => e.selected).length;
        document.getElementById('retryCount').innerText = selectedCount;
        const selectAllChk = document.getElementById('selectAll');
        if (errorItems.length === 0) return;
        const allSelected = errorItems.every(e => e.selected);
        selectAllChk.checked = allSelected;
        selectAllChk.indeterminate = (!allSelected && errorItems.some(e => e.selected));
    }

    // 전체 선택/해제 (ERROR만)
    document.getElementById('selectAll').addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        errorItems.forEach(item => item.selected = isChecked);
        renderTable();  // 다시 그리기
    });

    // 오류 재시도 시뮬레이션
    document.getElementById('retryBtn').addEventListener('click', async () => {
        const selectedErrors = errorItems.filter(item => item.selected);
        if (selectedErrors.length === 0) {
            showMessage("⚠️ 재시도할 오류 항목을 선택해주세요.", "warning");
            return;
        }

        const btn = document.getElementById('retryBtn');
        btn.disabled = true;
        const originalText = btn.innerText;
        btn.innerText = "🔄 재시도 중...";

        showMessage(`🔁 총 ${selectedErrors.length}개 오류에 대해 재시도를 시작합니다. (실제 크롤링 재요청 시뮬레이션)`, "info");

        let successCount = 0;
        let failCount = 0;

        // 각 오류에 대해 실제 API 재시도
        for (let i = 0; i < selectedErrors.length; i++) {
            const err = selectedErrors[i];
            try {
                const res = await fetch(BASE_URL + '/api/retry-missing', {
                    method     : 'POST',
                    headers    : { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body       : JSON.stringify({ log_id: err.id, message: err.detail })
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    successCount++;
                    addTempMessage(`✅ 재시도 성공: ${err.detail.substring(0, 60)}...`);
                    const index = errorItems.findIndex(e => e.id === err.id);
                    if (index !== -1) errorItems.splice(index, 1);
                } else {
                    throw new Error(result.message || '실패');
                }
            } catch(e) {
                failCount++;
                addTempMessage(`❌ 재시도 실패: ${err.detail.substring(0, 60)}... (${e.message})`);
                err.selected = false;
            }
            renderTable();
        }

        btn.disabled = false;
        btn.innerText = originalText;

        const finalMsg = `✅ 재시도 완료: 성공 ${successCount}건, 실패 ${failCount}건. ${successCount > 0 ? '성공한 로그는 목록에서 제거되었습니다.' : ''}`;
        showMessage(finalMsg, successCount > 0 ? "success" : "error");

        if (failCount === 0 && errorItems.length === 0) {
            showMessage("🎉 모든 오류가 해결되었습니다! 크롤링 정상화 상태입니다.", "success");
        } else if (failCount > 0) {
            showMessage(`⚠️ ${failCount}개 항목은 재시도에 실패했습니다. 네트워크/타겟 상태 확인 후 다시 시도하세요.`, "warning");
        }
        renderTable();
    });

    function showMessage(msg, type) {
        const msgDiv = document.getElementById('messageArea');
        msgDiv.innerHTML = `<strong>📢 ${type === 'error' ? '오류' : type === 'warning' ? '경고' : '알림'}:</strong> ${msg}`;
        msgDiv.className = 'message-area show';
        if (type === 'success') msgDiv.style.background = '#d1e7dd';
        else if (type === 'warning') msgDiv.style.background = '#fff3cd';
        else if (type === 'error') msgDiv.style.background = '#f8d7da';
        else msgDiv.style.background = '#e2f0fb';
        setTimeout(() => {
            // 5초 후 자동 숨김하지 않고 유지해도 좋으나, 새 메시지가 오면 덮임
        }, 100);
    }

    function addTempMessage(msg) {
        const msgDiv = document.getElementById('messageArea');
        const currentHtml = msgDiv.innerHTML;
        msgDiv.innerHTML = currentHtml + `<div style="font-size:12px; margin-top:5px;">⏳ ${msg}</div>`;
        msgDiv.classList.add('show');
    }

    // 초기 로드: 실제 API에서 로그 가져오기
    loadLogs();
</script>
</body>
</html>
