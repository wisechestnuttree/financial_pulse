<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>메인 대시보드 — Financial Pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>

<div class="app-shell">
  <aside class="sidebar" id="appSidebar"></aside>
  <main class="content">
    <div class="panel topbar">
      <div>

          <i class="fas fa-magnifying-glass search-icon"></i>

        </div>
        <div class="search-tags" id="searchTags">
          <button class="search-tag">IT/기술</button>
          <button class="search-tag">금융</button>
          <button class="search-tag">중공업/인프라</button>
          <button class="search-tag">소비재/서비스</button>
          <button class="search-tag">바이오/헬스</button>
          <button class="search-tag">모빌리티</button>
          <button class="search-tag">매크로/정책</button>
        </div>

      <div class="sw-group" id="countrySwitch">

    <!-- proto_v13의 #mainPageView 구조 -->

          <div>
            <div class="pt"><i class="fas fa-fire" style="color:var(--teal);margin-right:8px;"></i>오늘의 핫이슈</div>
            <div class="pd">키워드별 기사 건수 비교</div>
          </div>
          <div class="fp-badge" id="currentCountryBadge" style="font-size:11px;">🇰🇷 한국</div>

  </main>
</div>

<!-- 성향 분석 오버레이 -->
<div id="analysisOverlay">
  <div id="analysisBox">
    <button class="ao-close" id="aoClose"><i class="fas fa-times"></i></button>
    <div class="ao-nav">
      <button class="ao-back" id="aoBack"><i class="fas fa-arrow-left"></i> 대시보드</button>
    </div>
    <div id="aoContent"></div>
  </div>
</div>

<script src="js/core.js?v=20260513-hotissue"></script>
<script src="js/api.js?v=20260513-hotissue"></script>
<script>
// ================================================================
// 전역 상태
// ================================================================
window.curCountry = 'kr';
window.curView    = 'single';
window.dashData   = { ko: null, en: null };

// ================================================================
// API 호출
// ================================================================
async function fetchDashboard(lang) {
  if (window.dashData[lang]) return window.dashData[lang];
  try {
    const res  = await fetch(BASE_URL + '/api/dashboard?lang=' + lang, { credentials: 'include' });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    window.dashData[lang] = json.data;
    return json.data;
  } catch(e) {
    console.error('dashboard API 오류:', e);
    return null;
  }
}

// ================================================================
// 데이터 변환 함수
// ================================================================
function toCoreSectors(d) {
  if (!d) return [];
  return (d.sector_tendency || []).map(s => {
    const spike    = (d.spike_analysis || []).find(sp => sp.sector === s.sector) || {};
    const articles = (spike.articles || []).map(a => ({
      title : a.title || '',
      source: a.url   || '',
      tag   : a.tendency === 'positive' ? '긍정' : a.tendency === 'negative' ? '부정' : '중립',
    }));
    return {
      name    : s.sector,
      normal  : spike.week_avg ? Math.round(spike.week_avg.pos) : 0,
      today   : Math.round(s.pos),
      articles: articles,
    };
  });
}

function toHotIssueItems(d) {
  return (d.hot_issues || [])
    .map(h => ({
      keyword : h.keyword || '-',
      count   : Number(h.count || 0),
      week_avg: Number(h.week_avg || 0),
      change  : 0,
    }))
    .filter(h => h.count > 0)
    .sort((a, b) => b.change - a.change)
    .slice(0, 6);
}

// ================================================================
// API 전용 렌더 함수들 (core.js 함수들을 API 데이터에 맞게 래핑)
// ================================================================

// 시장 전체 성향 (API 데이터 → core.js의 renderMarketSentiment)
function renderMarketSentimentFromApi(cid, marketTendency) {
  if (!marketTendency) {
    document.getElementById(cid).innerHTML = '<div style="color:var(--sub);">데이터 없음</div>';
    return;
  }
  // core.js의 renderMarketSentiment는 sectors 배열(articles 포함)을 받음
  // 더미 sectors 생성
  const dummySectors = [
    { articles: Array(marketTendency.pos_count || 0).fill({ tag: '긍정' }) },
    { articles: Array(marketTendency.neg_count || 0).fill({ tag: '부정' }) },
    { articles: Array(marketTendency.neu_count || 0).fill({ tag: '중립' }) },
  ];
  renderMarketSentiment(cid, dummySectors);
}

// 섹터별 긍/부정 비율 (API 데이터 → core.js의 renderSectorStack)
// ❌ 현재 함수 전체를 아래로 교체

function renderSectorStackFromApi(cid, sectorTendency) {
  if (!sectorTendency || !sectorTendency.length) {
    document.getElementById(cid).innerHTML = '<div style="color:var(--sub);font-size:13px;">데이터 없음</div>';
    return;
  }
  const stacks = sectorTendency.map(s => ({ name: s.sector, pos: s.pos, neg: s.neg }));
  const c      = document.getElementById(cid);
  if (!c) return;

  // 스크롤 컨테이너
  c.style.maxHeight   = '320px';
  c.style.overflowY   = 'auto';
  c.style.paddingRight = '4px';

  c.innerHTML = stacks.map(s => `
    <div class="stack-item">
      <div class="stack-label">
        <span>${s.name}</span>
        <span style="font-size:11px;color:var(--sub);">긍정 ${Math.round(s.pos)}% · 부정 ${Math.round(s.neg)}%</span>
      </div>
      <div class="stack-bar-bg">
        <div class="stack-pos" style="width:${s.pos}%;"></div>
        <div class="stack-neg" style="width:${s.neg}%;"></div>
      </div>
    </div>`).join('');
}

// 주요 경제 지표 (API 데이터 직접 렌더링)
function renderEcoIndicatorsFromApi(cid, indicators) {
  const container = document.getElementById(cid);
  if (!container) return;
  if (!indicators || !indicators.length) {
    container.innerHTML = '<div style="color:var(--sub);">경제 지표 없음</div>';
    return;
  }
  container.innerHTML = indicators.map(ind => `
    <div class="ind-card">
      <div class="ind-name">${ind.country === '미국' ? '🇺🇸' : '🇰🇷'} ${ind.label || ind.name || ''}</div>
      <div class="ind-val">
        ${ind.actual || ind.value || '-'}
        ${ind.previous ? `<span class="ind-chg">(이전: ${ind.previous})</span>` : ''}
      </div>
      <div style="font-size:11px;color:var(--sub);">${ind.date || ''}</div>
    </div>
  `).join('');
}

// 경제 일정 (API 데이터 직접 렌더링)
function renderEcoScheduleFromApi(cid, schedule) {
  const container = document.getElementById(cid);
  if (!container) return;
  if (!schedule || !schedule.length) {
    container.innerHTML = '<div style="color:var(--sub);">일정 없음</div>';
    return;
  }
  container.innerHTML = schedule.map(ev => {
    let importance = ev.importance || 'mid';
    let borderColor = 'var(--teal)';
    let label = '보통';
    if (importance === 'high') { borderColor = 'var(--neg)'; label = '중요'; }
    else if (importance === 'mid') { borderColor = 'var(--gold)'; label = '중간'; }
    return `
      <div class="sch-item" style="border-left-color: ${borderColor};">
        <div class="sch-date">${ev.date || ''}</div>
        <div class="sch-info">
          <div class="sch-name">${ev.event || ev['경제일정'] || ''}</div>
          <span class="sch-imp">${label}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ================================================================
// 단일 보기 메트릭 카드
// ================================================================
function updateMetricCards(d, lbl) {
  const tendency = d.tendency    || { pos: 0, neg: 0, neu: 0, label: '-' };
  const topKw    = d.top_keyword || { keyword: '-', count: 0 };
  const posKw    = d.pos_keyword || { keyword: '-', ratio: 0 };
  const negKw    = d.neg_keyword || { keyword: '-', ratio: 0 };

  // ★ label에 따라 표시할 퍼센트 결정
  let displayPct = tendency.pos;
  let displayLabel = tendency.label || '긍정';
  if (displayLabel === '부정') {
    displayPct = tendency.neg;
  } else if (displayLabel === '중립') {
    displayPct = (100 - (tendency.pos || 0) - (tendency.neg || 0)).toFixed(1);
  } else {
    displayPct = tendency.pos; // 긍정
  }

  document.getElementById('summaryGrid').innerHTML = `
    <div class="panel metric-card ${tendency.label === '긍정' ? 'c-pos' : 'c-neg'}">
  <div class="mc-label">오늘 전체 분위기 (${lbl})</div>
  <div class="mc-value" style="color:${tendency.label === '긍정' ? 'var(--pos)' : 'var(--neg)'};">
    ${tendency.label || '긍정'} ${tendency.label === '긍정' ? tendency.pos : tendency.neg}%
  </div>
  <div class="mc-sub">긍정 ${tendency.pos}% · 부정 ${tendency.neg}%</div>
</div>
    <div class="panel metric-card c-pos">
      <div class="mc-label">오늘 기사량 1위 섹터</div>
      <div class="mc-value">${topKw.sector || '-'}</div>
      <div class="mc-sub">기사 ${topKw.count}건</div>
    </div>
    <div class="panel metric-card c-gold">
      <div class="mc-label">긍정 1위 키워드</div>
      <div class="mc-value" style="color:var(--gold);">${posKw.keyword || '-'}</div>
      <div class="mc-sub">전체의 ${posKw.ratio}%</div>
    </div>
    <div class="panel metric-card c-neg">
      <div class="mc-label">부정 1위 키워드</div>
      <div class="mc-value" style="color:var(--neg);">${negKw.keyword || '-'}</div>
      <div class="mc-sub">전체의 ${negKw.ratio}%</div>
    </div>
  `;
}

// ================================================================
// 단일 보기 렌더링
// ================================================================
async function renderSingleView() {
  const lang = curCountry === 'kr' ? 'ko' : 'en';
  const lbl  = curCountry === 'kr' ? '국내' : '해외';

  document.getElementById('summaryGrid').innerHTML = '<div style="color:var(--sub);padding:20px;">데이터 불러오는 중...</div>';
  document.getElementById('currentCountryBadge').innerText = lbl === '국내' ? '🇰🇷 한국' : '🇺🇸 미국';

  const d = await fetchDashboard(lang);
  if (!d) {
    document.getElementById('summaryGrid').innerHTML = '<div style="color:var(--neg);padding:20px;">데이터를 불러오지 못했습니다.</div>';
    return;
  }

  updateMetricCards(d, lbl);

  const hotIssues = toHotIssueItems(d);
  renderHotIssueGrid('hotIssueGrid', hotIssues/*.length ? hotIssues : toCoreSectors(d)*/);

  document.getElementById('dynamicContent').innerHTML = `
    <div class="two-col">
      <div class="col">
        <div class="panel trend-panel" style="padding:22px;">
          <div class="ph"><div><div class="pt">오늘 섹터 성향 분석</div><div class="pd">긍정률 변화</div></div></div>
          <div class="trend-list" id="trendGrid"></div>
        </div>
      </div>
      <div class="col right-col">
        <div class="panel sentiment-panel" style="padding:22px;">
          <div class="ph"><div class="pt">시장 전체 성향 비율</div></div>
          <div id="sentimentDonut"></div>
        </div>
        <div class="panel" style="padding:22px;">
          <div class="ph"><div class="pt">섹터별 긍/부정 비율</div></div>
          <div class="stack-list" id="sectorStack"></div>
        </div>
      </div>
    </div>
    <div class="two-col">
      <div class="col">
        <div class="panel" style="padding:22px;">
          <div class="ph"><div class="pt">주요 경제 지표</div><div class="pd"><a id="ecoTitle" href="#" target="_blank">상세보기 ↗</a></div></div>
          <div id="ecoIndicators" class="indicators-grid"></div>
        </div>
      </div>
      <div class="col">
        <div class="panel" style="padding:22px;">
          <div class="ph"><div class="pt">경제 주요 일정</div><div class="pd"><a id="ecoCalLink" href="#" target="_blank">상세보기 ↗</a></div></div>
          <div id="ecoCalendar" class="sch-list"></div>
        </div>
      </div>
    </div>
  `;

  const sectors = toCoreSectors(d);
  renderTrendAnalysisFromApi('trendGrid', d.spike_analysis || []);
  renderMarketSentimentFromApi('sentimentDonut', d.market_tendency);
  renderSectorStackFromApi('sectorStack', d.sector_tendency);
  let filteredIndicators = (d.eco_indicators || []).filter(ind => {
      if (curCountry === 'kr') return ind.country === '대한민국' || ind.country === 'KR';
      else return ind.country === '미국' || ind.country === 'US';
  });
  renderEcoIndicatorsFromApi('ecoIndicators', filteredIndicators);
  renderEcoScheduleFromApi('ecoCalendar', d.eco_schedule || []);

  const ecoTitle = document.getElementById('ecoTitle');
  if (ecoTitle) ecoTitle.onclick = () => window.open(
    curCountry === 'kr'
      ? 'https://www.korcham.net/nCham/Service/EconBrief/appl/ProspectList.asp'
      : 'https://www.korcham.net/nCham/Service/EconBrief/appl/ProspectList.asp');
  const ecoCalLink = document.getElementById('ecoCalLink');
  if (ecoCalLink) ecoCalLink.href = curCountry === 'kr'
    ? 'https://datacenter.hankyung.com/economic-calendar'
    : 'https://datacenter.hankyung.com/economic-calendar';

  const kwList = hotIssues.map(h => ({ keyword: h.keyword, totalNews: h.count }));
  updateTodayKeywords(kwList.length ? kwList : (curCountry === 'kr' ? DOM_KW : GBL_KW));
}

// ================================================================
// 분할 보기 렌더링 (레이아웃 생성 + API 데이터)
// ================================================================
async function renderSplitView() {
  try {
    // 1. 레이아웃 생성 (splitView 내부에 두 개의 컬럼 추가)
    const splitContainer = document.getElementById('splitView');
    splitContainer.innerHTML = `
      <div class="split-layout">
        <div class="split-col" id="splitLeft"></div>
        <div class="split-col" id="splitRight"></div>
      </div>
    `;

    // 2. 데이터 병렬 호출
    const [dataKR, dataUS] = await Promise.all([
      fetchDashboard('ko'),
      fetchDashboard('en')
    ]);

    if (!dataKR || !dataUS) {
      splitContainer.innerHTML = '<div class="panel" style="padding:20px;color:var(--neg);">데이터를 불러올 수 없습니다.</div>';
      return;
    }

    // 3. sectors 변환
    const krSectorsApi = toCoreSectors(dataKR);
    const usSectorsApi = toCoreSectors(dataUS);

    // 4. 핫이슈 아이템
    const hotKR = toHotIssueItems(dataKR);
    const hotUS = toHotIssueItems(dataUS);

    // 5. 각 컬럼에 makeSplitCol로 기본 패널 생성
    const idsKR = { hot:'hotKR', trend:'trendKR', donut:'donutKR', stack:'stackKR', eco:'ecoKR', cal:'calKR' };
    const idsUS = { hot:'hotUS', trend:'trendUS', donut:'donutUS', stack:'stackUS', eco:'ecoUS', cal:'calUS' };

    document.getElementById('splitLeft').innerHTML = makeSplitCol([], '한국', idsKR, 'kr');
    document.getElementById('splitRight').innerHTML = makeSplitCol([], '해외', idsUS, 'us');

    // 6. 왼쪽(국내) 패널 데이터 렌더링
    renderHotIssueGrid('hotKR', hotKR);
    renderTrendAnalysis('trendKR', krSectorsApi);
    renderMarketSentimentFromApi('donutKR', dataKR.market_tendency);
    renderSectorStackFromApi('stackKR', dataKR.sector_tendency);
    let krIndicators = (dataKR.eco_indicators || []).filter(ind =>
        ind.country === '대한민국');
    renderEcoIndicatorsFromApi('ecoKR', krIndicators);
    renderEcoScheduleFromApi('calKR', dataKR.eco_schedule || []);

    // 7. 오른쪽(해외) 패널 데이터 렌더링
    renderHotIssueGrid('hotUS', hotUS);
    renderTrendAnalysis('trendUS', usSectorsApi);
    renderMarketSentimentFromApi('donutUS', dataUS.market_tendency);
    renderSectorStackFromApi('stackUS', dataUS.sector_tendency);
    let usIndicators = (dataUS.eco_indicators || []).filter(ind =>
        ind.country === '미국');
    renderEcoIndicatorsFromApi('ecoUS', usIndicators);
    renderEcoScheduleFromApi('calUS', dataUS.eco_schedule || []);

    // 8. 상세보기 링크
    const bindEcoTitle = (titleId, url) => {
      const el = document.getElementById(titleId);
      if (el) el.onclick = () => window.open(url, '_blank');
    };
    bindEcoTitle('ecoKRTitle', 'https://www.korcham.net/nCham/Service/EconBrief/appl/ProspectList.asp');
    bindEcoTitle('ecoUSTitle', 'https://www.korcham.net/nCham/Service/EconBrief/appl/ProspectList.asp');
  } catch (err) {
    console.error('renderSplitView 오류:', err);
    document.getElementById('splitView').innerHTML = '<div class="panel" style="padding:20px;color:var(--neg);">분할 보기 렌더링 중 오류 발생</div>';
  }
}

// ================================================================
// 뷰 전환 함수
// ================================================================
async function switchView(view) {
  window.curView = view;
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  if (view === 'single') {
    document.getElementById('splitView').style.display = 'none';
    document.getElementById('dynamicContent').style.display = 'block';
    document.getElementById('hotIssuePanelWrapper').style.display = 'block';
    await renderSingleView();
  } else {
    document.getElementById('splitView').style.display = 'block';
    document.getElementById('dynamicContent').style.display = 'none';
    document.getElementById('hotIssuePanelWrapper').style.display = 'none';
    await renderSplitView();
  }
}

// ================================================================
// 이벤트 바인딩
// ================================================================
function bindEvents() {
  document.querySelectorAll('#countrySwitch .sw-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      curCountry = btn.dataset.country;
      document.querySelectorAll('#countrySwitch .sw-btn').forEach(b => b.classList.toggle('active', b.dataset.country === curCountry));
      if (curView === 'single') await renderSingleView();
      else await switchView('single');
    });
  });

  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  const searchBtn = document.getElementById('searchBtn');
  const searchInput = document.getElementById('searchInput');
  const doSearch = () => {
    const kw = searchInput.value.trim();
    if (kw && typeof openAnalysisOverlay === 'function') openAnalysisOverlay(kw);
  };
  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });

  document.querySelectorAll('.search-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      searchInput.value = tag.textContent;
      doSearch();
    });
  });

  const overlay = document.getElementById('analysisOverlay');
  const closeBtn = document.getElementById('aoClose');
  const backBtn = document.getElementById('aoBack');
  const closeOverlay = () => overlay.classList.remove('show');
  closeBtn?.addEventListener('click', closeOverlay);
  backBtn?.addEventListener('click', closeOverlay);

}

// ================================================================
// 초기화
// ================================================================
window.addEventListener('DOMContentLoaded', async () => {
  const session = await checkSession(false);
  if (!session) return;

  const sidebar = document.getElementById('appSidebar');
  if (sidebar && typeof renderSidebar === 'function') {
    sidebar.innerHTML = renderSidebar('dashboard');
  }
  if (typeof bindSidebarEvents === 'function') bindSidebarEvents();

  bindEvents();
  await switchView('single');
});

function renderTrendAnalysisFromApi(cid, spikeAnalysis) {
  const c = document.getElementById(cid);
  if (!c) return;
  if (!spikeAnalysis.length) {
    c.innerHTML = '<div style="color:var(--sub);padding:16px;">데이터 없음</div>';
    return;
  }

  c.innerHTML = spikeAnalysis.map(s => {
    const todayPos  = s.today.pos;
    const total     = s.today.total;
    const change    = s.change.pos;
    const isUp      = change >= 0;

    let statusColor, statusLabel;
    if (todayPos > 50)      { statusColor = 'var(--pos)'; statusLabel = '긍정'; }
    else if (todayPos < 50) { statusColor = 'var(--neg)'; statusLabel = '부정'; }
    else                    { statusColor = 'var(--sub)'; statusLabel = '중립'; }

    const changeColor = isUp ? 'var(--pos)' : 'var(--neg)';
    const changeIcon  = isUp ? '▲' : '▼';

    return `
      <div class="trend-item" style="
        border-left: 4px solid ${statusColor};
        padding: 14px 16px;
        margin-bottom: 10px;
        background: var(--panel-bg);
        border-radius: 8px;
        cursor: pointer;
      ">
        <!-- 1행: 섹터명 + 건수 -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <strong style="font-size:15px;color:var(--navy);">${s.sector}</strong>
          </div>
          <span style="font-size:12px;color:var(--sub);">📰 ${total}건</span>
        </div>

        <!-- 2행: 변화량(좌) + 긍정/부정 라벨(우) -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:13px;font-weight:700;color:${changeColor};">
            ${changeIcon} ${Math.abs(change).toFixed(1)}%p 변화
          </span>
          <span style="font-size:22px;font-weight:900;color:${statusColor};">
            ${statusLabel}
          </span>
        </div>

        <!-- 3행: 평소/오늘 바 -->
        <div style="display:flex;gap:16px;">
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">평소</div>
            <div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden;">
              <div style="width:${s.week_avg.pos}%;height:100%;background:#c0cfe0;border-radius:4px;"></div>
            </div>
            <div style="font-size:11px;color:var(--sub);margin-top:2px;">${s.week_avg.pos.toFixed(1)}%</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">오늘</div>
            <div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden;">
              <div style="width:${todayPos}%;height:100%;background:${statusColor};border-radius:4px;"></div>
            </div>
            <div style="font-size:11px;color:${statusColor};margin-top:2px;font-weight:700;">${todayPos.toFixed(1)}%</div>
          </div>
        </div>

      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
