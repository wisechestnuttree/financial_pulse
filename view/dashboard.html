// ================================================================
// м „м—ӯ мғҒнғң

// ================================================================
// API нҳём¶ң
// ================================================================
async function fetchDashboard(lang) {
  if (window.dashData[lang]) return window.dashData[lang];
  try {
    const res  = await fetch(BASE_URL + '/api/dashboard?lang=' + lang, { credentials: 'include' });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    window.dashData[lang] = json.data;
    return json.data;
  } catch(e) {
    console.error('dashboard API мҳӨлҘҳ:', e);
    return null;
  }
}

// ================================================================
// лҚ°мқҙн„° ліҖнҷҳ н•ЁмҲҳ
// ================================================================
function toCoreSectors(d) {
  if (!d) return [];
  return (d.sector_tendency || []).map(s => {
    const spike    = (d.spike_analysis || []).find(sp => sp.sector === s.sector) || {};
    const articles = (spike.articles || []).map(a => ({
      title : a.title || '',
      source: a.url   || '',
      tag   : a.tendency === 'positive' ? 'кёҚм •' : a.tendency === 'negative' ? 'л¶Җм •' : 'мӨ‘лҰҪ',
    }));
    return {
      name    : s.sector,
      normal  : spike.week_avg ? Math.round(spike.week_avg.pos) : 0,
      today   : Math.round(s.pos),
      articles: articles,
    };
  });
}

function toHotIssueItems(d) {
  return (d.hot_issues || [])
    .map(h => ({
      keyword : h.keyword || '-',
      count   : Number(h.count || 0),
      week_avg: Number(h.week_avg || 0),
      change  : 0,
    }))
    .filter(h => h.count > 0)
    .sort((a, b) => b.change - a.change)
    .slice(0, 6);
}

// ================================================================
// API м „мҡ© л ҢлҚ” н•ЁмҲҳл“Ө (core.js н•ЁмҲҳл“Өмқ„ API лҚ°мқҙн„°м—җ л§һкІҢ лһҳн•‘)
// ================================================================

// мӢңмһҘ м „мІҙ м„ұн–Ҙ (API лҚ°мқҙн„° вҶ’ core.jsмқҳ renderMarketSentiment)
function renderMarketSentimentFromApi(cid, marketTendency) {
  const container = document.getElementById(cid);
  if (!marketTendency) {
    container.innerHTML = '<div style="color:var(--sub);">лҚ°мқҙн„° м—ҶмқҢ</div>';
    return;
  }
  
  const pos = marketTendency.pos_count || 0;
  const neg = marketTendency.neg_count || 0;
  const total = pos + neg;
  const posRatio = total === 0 ? 0 : (pos / total) * 100;
  const negRatio = total === 0 ? 0 : (neg / total) * 100;

  // лҸ„л„ӣ м°ЁнҠё SVG мғқм„ұ (кёҚм •, л¶Җм •л§Ң)
  const sz = 200, r = sz / 2, inn = 58, c = r;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", sz);
  svg.setAttribute("height", sz);
  svg.setAttribute("viewBox", `0 0 ${sz} ${sz}`);

  let startAngle = 0;
  [[posRatio, '#2ECC71'], [negRatio, '#E74C3C']].forEach(([val, col]) => {
    if (val === 0) return;
    const angle = (val / 100) * 360;
    const endAngle = startAngle + angle;
    const radStart = (startAngle - 90) * Math.PI / 180;
    const radEnd = (endAngle - 90) * Math.PI / 180;
    const x1 = c + r * Math.cos(radStart);
    const y1 = c + r * Math.sin(radStart);
    const x2 = c + r * Math.cos(radEnd);
    const y2 = c + r * Math.sin(radEnd);
    const largeArc = angle > 180 ? 1 : 0;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${c} ${c} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`);
    path.setAttribute("fill", col);
    path.setAttribute("stroke", "white");
    path.setAttribute("stroke-width", "3");
    svg.appendChild(path);
    startAngle = endAngle;
  });

  // к°ҖмҡҙлҚ° мӣҗ
  const innerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  innerCircle.setAttribute("cx", c);
  innerCircle.setAttribute("cy", c);
  innerCircle.setAttribute("r", inn);
  innerCircle.setAttribute("fill", "#f0f6ff");
  svg.appendChild(innerCircle);

  const dominant = posRatio >= negRatio ? 'кёҚм •' : 'л¶Җм •';
  const dominantPct = Math.max(posRatio, negRatio).toFixed(1);
  const dominantColor = posRatio >= negRatio ? 'var(--pos)' : 'var(--neg)';

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;height:100%">
      <div class="market-donut" style="position:relative;">
        ${svg.outerHTML}
        <div class="donut-center">
          <span class="pulse-num" style="font-size:26px;color:${dominantColor};">${dominantPct}%</span>
          <span style="font-size:11px;color:var(--sub);margin-top:2px;">${dominant}</span>
        </div>
      </div>
      <div class="market-legend">
        <span class="leg-item"><span class="leg-dot" style="background:#2ECC71;"></span>кёҚм • ${posRatio.toFixed(1)}%</span>
        <span class="leg-item"><span class="leg-dot" style="background:#E74C3C;"></span>л¶Җм • ${negRatio.toFixed(1)}%</span>
      </div>
    </div>
  `;
}

// м„№н„°лі„ кёҚ/л¶Җм • л№„мңЁ (API лҚ°мқҙн„° вҶ’ core.jsмқҳ renderSectorStack)
// вқҢ нҳ„мһ¬ н•ЁмҲҳ м „мІҙлҘј м•„лһҳлЎң көҗмІҙ

function renderSectorStackFromApi(cid, sectorTendency) {
  if (!sectorTendency || !sectorTendency.length) {
    document.getElementById(cid).innerHTML = '<div style="color:var(--sub);font-size:13px;">лҚ°мқҙн„° м—ҶмқҢ</div>';
    return;
  }
  const stacks = sectorTendency.map(s => ({ name: s.sector, pos: s.pos, neg: s.neg }));
  const c      = document.getElementById(cid);
  if (!c) return;

  // мҠӨнҒ¬лЎӨ м»Ён…Ңмқҙл„Ҳ
  c.style.maxHeight   = '320px';
  c.style.overflowY   = 'auto';
  c.style.paddingRight = '4px';

  c.innerHTML = stacks.map(s => `
    <div class="stack-item">
      <div class="stack-label">
        <span>${s.name}</span>
        <span style="font-size:11px;color:var(--sub);">кёҚм • ${s.pos.toFixed(1)}% В· л¶Җм • ${s.neg.toFixed(1)}%</span>
      </div>
      <div class="stack-bar-bg">
        <div class="stack-pos" style="width:${s.pos}%;"></div>
        <div class="stack-neg" style="width:${s.neg}%;"></div>
      </div>
    </div>`).join('');
}

// мЈјмҡ” кІҪм ң м§Җн‘ң (API лҚ°мқҙн„° м§Ғм ‘ л ҢлҚ”л§Ғ)
function renderEcoIndicatorsFromApi(cid, indicators) {
  const container = document.getElementById(cid);
  if (!container) return;
  if (!indicators || !indicators.length) {
    container.innerHTML = '<div style="color:var(--sub);">кІҪм ң м§Җн‘ң м—ҶмқҢ</div>';
    return;
  }
  container.innerHTML = indicators.map(ind => `
    <div class="ind-card">
      <div class="ind-name">${ind.country === 'лҜёкөӯ' ? 'рҹҮәрҹҮё' : 'рҹҮ°рҹҮ·'} ${ind.label || ind.name || ''}</div>
      <div class="ind-val">
        ${ind.actual || ind.value || '-'}
        ${ind.previous ? `<span class="ind-chg">(мқҙм „: ${ind.previous})</span>` : ''}
      </div>
      <div style="font-size:11px;color:var(--sub);">${ind.date || ''}</div>
    </div>
  `).join('');
}

// кІҪм ң мқјм • (API лҚ°мқҙн„° м§Ғм ‘ л ҢлҚ”л§Ғ)
function renderEcoScheduleFromApi(cid, schedule) {
  const container = document.getElementById(cid);
  if (!container) return;
  if (!schedule || !schedule.length) {
    container.innerHTML = '<div style="color:var(--sub);">мқјм • м—ҶмқҢ</div>';
    return;
  }
  container.innerHTML = schedule.map(ev => {
    let importance = ev.importance || 'mid';
    let borderColor = 'var(--teal)';
    let label = 'ліҙнҶө';
    if (importance === 'high') { borderColor = 'var(--neg)'; label = 'мӨ‘мҡ”'; }
    else if (importance === 'mid') { borderColor = 'var(--gold)'; label = 'мӨ‘к°„'; }
    return `
      <div class="sch-item" style="border-left-color: ${borderColor};">
        <div class="sch-date">${ev.date || ''}</div>
        <div class="sch-info">
          <div class="sch-name">${ev.event || ev['кІҪм ңмқјм •'] || ''}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="sch-imp">${label}</span>
            <span style="font-size:13px;">${ev.country === 'лҢҖн•ңлҜјкөӯ' ? 'рҹҮ°рҹҮ·' : ev.country === 'лҜёкөӯ' ? 'рҹҮәрҹҮё' : ''}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ================================================================
// лӢЁмқј ліҙкё° л©”нҠёлҰӯ м№ҙл“ң
// ================================================================
function updateMetricCards(d, lbl) {
  const tendency = d.tendency    || { pos: 0, neg: 0, neu: 0, label: '-' };
  const topKw    = d.top_keyword || { keyword: '-', count: 0 };
  const posKw    = d.pos_keyword || { keyword: '-', ratio: 0 };
  const negKw    = d.neg_keyword || { keyword: '-', ratio: 0 };

  // вҳ… labelм—җ л”°лқј н‘ңмӢңн•  нҚјм„јнҠё кІ°м •
  let displayPct = tendency.pos;
  let displayLabel = tendency.label || 'кёҚм •';
  if (displayLabel === 'л¶Җм •') {
    displayPct = tendency.neg;
  } else if (displayLabel === 'мӨ‘лҰҪ') {
    displayPct = (100 - (tendency.pos || 0) - (tendency.neg || 0)).toFixed(1);
  } else {
    displayPct = tendency.pos; // кёҚм •
  }

  document.getElementById('summaryGrid').innerHTML = `
    <div class="panel metric-card ${tendency.label === 'кёҚм •' ? 'c-pos' : 'c-neg'}">
  <div class="mc-label">мҳӨлҠҳ м „мІҙ л¶„мң„кё° (${lbl})</div>
  <div class="mc-value" style="color:${tendency.label === 'кёҚм •' ? 'var(--pos)' : 'var(--neg)'};">
    ${tendency.label || 'кёҚм •'} ${tendency.label === 'кёҚм •' ? tendency.pos : tendency.neg}%
  </div>
  <div class="mc-sub">кёҚм • ${tendency.pos}% В· л¶Җм • ${tendency.neg}%</div>
</div>
    <div class="panel metric-card c-pos">
      <div class="mc-label">мҳӨлҠҳ кё°мӮ¬лҹү 1мң„ м„№н„°</div>
      <div class="mc-value">${topKw.sector || '-'}</div>
      <div class="mc-sub">кё°мӮ¬ ${topKw.count}кұҙ</div>
    </div>
    <div class="panel metric-card c-gold">
      <div class="mc-label">кёҚм • 1мң„ нӮӨмӣҢл“ң</div>
      <div class="mc-value" style="color:var(--gold);">${posKw.keyword || '-'}</div>
      <div class="mc-sub">м „мІҙмқҳ ${posKw.ratio}%</div>
    </div>
    <div class="panel metric-card c-neg">
      <div class="mc-label">л¶Җм • 1мң„ нӮӨмӣҢл“ң</div>
      <div class="mc-value" style="color:var(--neg);">${negKw.keyword || '-'}</div>
      <div class="mc-sub">м „мІҙмқҳ ${negKw.ratio}%</div>
    </div>
  `;
}

// лӢЁмқј ліҙкё° л ҢлҚ”л§Ғ
async function renderSplitView() {
  try {
    const splitContainer = document.getElementById('splitView');
    // кё°мЎҙмІҳлҹј split-layout мғқм„ұ (makeSplitCol мӮ¬мҡ©)
    splitContainer.innerHTML = `
      <div class="split-layout">
        <div class="split-col" id="splitLeft"></div>
        <div class="split-col" id="splitRight"></div>
      </div>
      <!-- мҷјмӘҪ мәҳлҰ°лҚ”лҘј мқҙлҸҷмӢңнӮ¬ м „мІҙ л„Ҳл№„ мҳҒм—ӯ -->
      <div id="fullWidthCalendar" style="margin-top: 22px;"></div>
    `;

    const [dataKR, dataUS] = await Promise.all([
      fetchDashboard('ko'),
      fetchDashboard('en')
    ]);

    if (!dataKR || !dataUS) {
      splitContainer.innerHTML = '<div class="panel" style="padding:20px;color:var(--neg);">лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.</div>';
      return;
    }

    const hotKR = toHotIssueItems(dataKR);
    const hotUS = toHotIssueItems(dataUS);
    const krSectorsApi = toCoreSectors(dataKR);
    const usSectorsApi = toCoreSectors(dataUS);

    // makeSplitColм—җ м „лӢ¬н•  IDл“Ө (мҷјмӘҪ/мҳӨлҘёмӘҪ к°Ғк°Ғ)
    const idsKR = { hot:'hotKR', trend:'trendKR', donut:'donutKR', stack:'stackKR', eco:'ecoKR', cal:'calKR' };
    const idsUS = { hot:'hotUS', trend:'trendUS', donut:'donutUS', stack:'stackUS', eco:'ecoUS', cal:'calUS' };

    document.getElementById('splitLeft').innerHTML = makeSplitCol(krSectorsApi, 'н•ңкөӯ', idsKR, 'kr');
    document.getElementById('splitRight').innerHTML = makeSplitCol(usSectorsApi, 'н•ҙмҷё', idsUS, 'us');

    // лҚ°мқҙн„° л ҢлҚ”л§Ғ (кё°мЎҙ н•ЁмҲҳл“Ө)
    renderHotIssueGrid('hotKR', hotKR);
    renderHotIssueGrid('hotUS', hotUS);
    renderTrendAnalysisFromApi('trendKR', dataKR.spike_analysis);
    renderTrendAnalysisFromApi('trendUS', dataUS.spike_analysis);
    renderMarketSentimentFromApi('donutKR', dataKR.market_tendency);
    renderMarketSentimentFromApi('donutUS', dataUS.market_tendency);
    renderSectorStackFromApi('stackKR', dataKR.sector_tendency);
    renderSectorStackFromApi('stackUS', dataUS.sector_tendency);

    let krIndicators = (dataKR.eco_indicators || []).filter(ind => ind.country === 'лҢҖн•ңлҜјкөӯ');
    let usIndicators = (dataUS.eco_indicators || []).filter(ind => ind.country === 'лҜёкөӯ');
    renderEcoIndicatorsFromApi('ecoKR', krIndicators);
    renderEcoIndicatorsFromApi('ecoUS', usIndicators);
    renderEcoScheduleFromApi('calKR', dataKR.eco_schedule || []);
    renderEcoScheduleFromApi('calUS', dataUS.eco_schedule || []);

    // ===== м—¬кё°м„ңл¶Җн„° мҳӨлҘёмӘҪ мәҳлҰ°лҚ” м ңкұ° + мҷјмӘҪ мәҳлҰ°лҚ” нҷ•мһҘ =====
    // 1) мҳӨлҘёмӘҪ м»¬лҹјм—җм„ң 'calUS' нҢЁл„җмқ„ к°җмӢёлҠ” мҡ”мҶҢ м°ҫм•„ м ңкұ°
    const rightCalendarPanel = document.querySelector('#splitRight .panel:has(#calUS)');
    if (rightCalendarPanel) rightCalendarPanel.remove();

    // 2) мҷјмӘҪ м»¬лҹјмқҳ мәҳлҰ°лҚ” нҢЁл„җмқ„ к°Җм ёмҷҖм„ң fullWidthCalendarлЎң мқҙлҸҷ
    const leftCalendarPanel = document.querySelector('#splitLeft .panel:has(#calKR)');
    if (leftCalendarPanel) {
      // мәҳлҰ°лҚ” нҢЁл„җмқ„ мӣҗлһҳ мң„м№ҳм—җм„ң м ңкұ°
      leftCalendarPanel.remove();
      // м „мІҙ л„Ҳл№„ мҳҒм—ӯм—җ м¶”к°Җ (мҠӨнғҖмқј мң м§Җ)
      const fullWidthDiv = document.getElementById('fullWidthCalendar');
      fullWidthDiv.innerHTML = '';
      fullWidthDiv.appendChild(leftCalendarPanel);
      // нҢЁл„җ м ңлӘ©м—җ "(н•ңкөӯ)" лӘ…мӢң
      const titleElem = leftCalendarPanel.querySelector('.pt');
      if (titleElem) titleElem.textContent = 'рҹ“… кІҪм ң мқјм •';
    }

    // (м„ нғқ) мәҳлҰ°лҚ” мғҒм„ёліҙкё° л§ҒнҒ¬ мҲҳм •
    const calLink = document.querySelector('#fullWidthCalendar a');
    if (calLink) calLink.href = 'https://datacenter.hankyung.com/economic-calendar';

  } catch (err) {
    console.error('renderSplitView мҳӨлҘҳ:', err);
    document.getElementById('splitView').innerHTML = '<div class="panel" style="padding:20px;color:var(--neg);">л¶„н•  ліҙкё° л ҢлҚ”л§Ғ мӨ‘ мҳӨлҘҳ л°ңмғқ</div>';
  }
}
async function renderSingleView() {
  const lang = curCountry === 'kr' ? 'ko' : 'en';
  const lbl  = curCountry === 'kr' ? 'көӯлӮҙ' : 'н•ҙмҷё';

  document.getElementById('summaryGrid').innerHTML = '<div style="color:var(--sub);padding:20px;">лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>';
  document.getElementById('currentCountryBadge').innerText = lbl === 'көӯлӮҙ' ? 'рҹҮ°рҹҮ· н•ңкөӯ' : 'рҹҮәрҹҮё лҜёкөӯ';

  const d = await fetchDashboard(lang);
  if (!d) {
    document.getElementById('summaryGrid').innerHTML = '<div style="color:var(--neg);padding:20px;">лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.</div>';
    return;
  }

  updateMetricCards(d, lbl);

  const hotIssues = toHotIssueItems(d);
  renderHotIssueGrid('hotIssueGrid', hotIssues/*.length ? hotIssues : toCoreSectors(d)*/);

  document.getElementById('dynamicContent').innerHTML = `
    <div class="two-col">
      <div class="col">
        <div class="panel trend-panel" style="padding:22px;">
          <div class="ph"><div><div class="pt">мҳӨлҠҳ м„№н„° м„ұн–Ҙ л¶„м„қ</div><div class="pd">кёҚм •лҘ  ліҖнҷ”</div></div></div>
          <div class="trend-list" id="trendGrid"></div>
        </div>
      </div>
      <div class="col right-col">
        <div class="panel sentiment-panel" style="padding:22px;">
          <div class="ph"><div class="pt">мӢңмһҘ м „мІҙ м„ұн–Ҙ л№„мңЁ</div></div>
          <div id="sentimentDonut"></div>
        </div>
        <div class="panel" style="padding:22px;">
          <div class="ph"><div class="pt">м„№н„°лі„ кёҚ/л¶Җм • л№„мңЁ</div></div>
          <div class="stack-list" id="sectorStack"></div>
        </div>
      </div>
    </div>
    <div class="two-col">
      <div class="col">
        <div class="panel" style="padding:22px;">
          <div class="ph"><div class="pt">мЈјмҡ” кІҪм ң м§Җн‘ң</div><div class="pd"><a id="ecoTitle" href="#" target="_blank">мғҒм„ёліҙкё° вҶ—</a></div></div>
          <div id="ecoIndicators" class="indicators-grid"></div>
        </div>
      </div>
      <div class="col">
        <div class="panel" style="padding:22px;">
          <div class="ph"><div class="pt">кІҪм ң мЈјмҡ” мқјм •</div><div class="pd"><a id="ecoCalLink" href="#" target="_blank">мғҒм„ёліҙкё° вҶ—</a></div></div>
          <div id="ecoCalendar" class="sch-list"></div>
        </div>
      </div>
    </div>
  `;

  const sectors = toCoreSectors(d);
  renderTrendAnalysisFromApi('trendGrid', d.spike_analysis || []);
  renderMarketSentimentFromApi('sentimentDonut', d.market_tendency);
  renderSectorStackFromApi('sectorStack', d.sector_tendency);
  let filteredIndicators = (d.eco_indicators || []).filter(ind => {
      if (curCountry === 'kr') return ind.country === 'лҢҖн•ңлҜјкөӯ' || ind.country === 'KR';
      else return ind.country === 'лҜёкөӯ' || ind.country === 'US';
  });
  renderEcoIndicatorsFromApi('ecoIndicators', filteredIndicators);
  renderEcoScheduleFromApi('ecoCalendar', d.eco_schedule || []);

  const ecoTitle = document.getElementById('ecoTitle');
  if (ecoTitle) ecoTitle.onclick = () => window.open(
    curCountry === 'kr'
      ? 'https://www.korcham.net/nCham/Service/EconBrief/appl/ProspectList.asp'
      : 'https://www.korcham.net/nCham/Service/EconBrief/appl/ProspectList.asp');
  const ecoCalLink = document.getElementById('ecoCalLink');
  if (ecoCalLink) ecoCalLink.href = curCountry === 'kr'
    ? 'https://datacenter.hankyung.com/economic-calendar'
    : 'https://datacenter.hankyung.com/economic-calendar';

  const kwList = hotIssues.map(h => ({ keyword: h.keyword, totalNews: h.count }));
  updateTodayKeywords(kwList.length ? kwList : (curCountry === 'kr' ? DOM_KW : GBL_KW));
}

async function switchView(view) {
  window.curView = view;
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  if (view === 'single') {
    document.getElementById('splitView').style.display = 'none';
    document.getElementById('dynamicContent').style.display = 'block';
    document.getElementById('hotIssuePanelWrapper').style.display = 'block';
    await renderSingleView();
  } else {
    document.getElementById('splitView').style.display = 'block';
    document.getElementById('dynamicContent').style.display = 'none';
    document.getElementById('hotIssuePanelWrapper').style.display = 'none';
    await renderSplitView();
  }
}

// ================================================================
// мқҙлІӨнҠё л°”мқёл”©
// ================================================================
function bindEvents() {
  document.querySelectorAll('#countrySwitch .sw-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      curCountry = btn.dataset.country;
      document.querySelectorAll('#countrySwitch .sw-btn').forEach(b => b.classList.toggle('active', b.dataset.country === curCountry));
      if (curView === 'single') await renderSingleView();
      else await switchView('single');
    });
  });

  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  const searchBtn = document.getElementById('searchBtn');
  const searchInput = document.getElementById('searchInput');
  const doSearch = () => {
    const kw = searchInput.value.trim();
    if (kw && typeof openAnalysisOverlay === 'function') openAnalysisOverlay(kw);
  };
  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });

  document.querySelectorAll('.search-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      searchInput.value = tag.textContent;
      doSearch();
    });
  });

  const overlay = document.getElementById('analysisOverlay');
  const closeBtn = document.getElementById('aoClose');
  const backBtn = document.getElementById('aoBack');
  const closeOverlay = () => overlay.classList.remove('show');
  closeBtn?.addEventListener('click', closeOverlay);
  backBtn?.addEventListener('click', closeOverlay);

}

// ================================================================
// мҙҲкё°нҷ”
// ================================================================
window.addEventListener('DOMContentLoaded', async () => {
  const session = await checkSession(false);
  if (!session) return;

  const sidebar = document.getElementById('appSidebar');
  if (sidebar && typeof renderSidebar === 'function') {
    sidebar.innerHTML = renderSidebar('dashboard');
  }
  if (typeof bindSidebarEvents === 'function') bindSidebarEvents();

  bindEvents();
  await switchView('single');
});

function renderTrendAnalysisFromApi(cid, spikeAnalysis) {
  const c = document.getElementById(cid);
  if (!c) return;
  if (!spikeAnalysis.length) {
    c.innerHTML = '<div style="color:var(--sub);padding:16px;">лҚ°мқҙн„° м—ҶмқҢ</div>';
    return;
  }

  const sorted = [...spikeAnalysis].sort((a, b) => a.sector.localeCompare(b.sector));

  c.innerHTML = sorted.map(s => {
    const todayPos  = s.today.pos;
    const total     = s.today.total;
    const change    = s.change.pos;
    const isUp      = change >= 0;

    let statusColor, statusLabel;
    if (todayPos > 50)      { statusColor = 'var(--pos)'; statusLabel = 'кёҚм •'; }
    else if (todayPos < 50) { statusColor = 'var(--neg)'; statusLabel = 'л¶Җм •'; }
    else                    { statusColor = 'var(--sub)'; statusLabel = 'мӨ‘лҰҪ'; }

    const changeColor = isUp ? 'var(--pos)' : 'var(--neg)';
    const changeIcon  = isUp ? 'в–І' : 'в–ј';

    return `
      <div class="trend-item" style="
        border-left: 4px solid ${statusColor};
        padding: 14px 16px;
        margin-bottom: 10px;
        background: var(--panel-bg);
        border-radius: 8px;
        cursor: pointer;
      ">
        <!-- 1н–ү: м„№н„°лӘ… + кұҙмҲҳ -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <strong style="font-size:15px;color:var(--navy);">${s.sector}</strong>
          </div>
          <span style="font-size:12px;color:var(--sub);">рҹ“° ${total}кұҙ</span>
        </div>

        <!-- 2н–ү: ліҖнҷ”лҹү(мўҢ) + кёҚм •/л¶Җм • лқјлІЁ(мҡ°) -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:13px;font-weight:700;color:${changeColor};">
            ${changeIcon} ${Math.abs(change).toFixed(1)}%p ліҖнҷ”
          </span>
          <span style="font-size:22px;font-weight:900;color:${statusColor};">
            ${statusLabel}
          </span>
        </div>

        <!-- 3н–ү: нҸүмҶҢ/мҳӨлҠҳ л°” -->
        <div style="display:flex;gap:16px;">
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">нҸүмҶҢ</div>
            <div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden;">
              <div style="width:${s.week_avg.pos}%;height:100%;background:#c0cfe0;border-radius:4px;"></div>
            </div>
            <div style="font-size:11px;color:var(--sub);margin-top:2px;">${s.week_avg.pos.toFixed(1)}%</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">мҳӨлҠҳ</div>
            <div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden;">
              <div style="width:${todayPos}%;height:100%;background:${statusColor};border-radius:4px;"></div>
            </div>
            <div style="font-size:11px;color:${statusColor};margin-top:2px;font-weight:700;">${todayPos.toFixed(1)}%</div>
          </div>
        </div>

      </div>
    `;
  }).join('');
}
</script>
